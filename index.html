<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeNet AI | Digital Public Safety Intelligence Platform Portal</title>
    <!-- Google Fonts: Inter and JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden Google Translate Element -->
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      window.googleTranslateElementInit = function() {
        new window.google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }

      // Enforce notranslate on all Material Icons to prevent layout overlap bugs
      const protectIcons = () => {
        document.querySelectorAll('.material-symbols-outlined').forEach((el) => {
          if (!el.classList.contains('notranslate')) el.classList.add('notranslate');
          if (el.getAttribute('translate') !== 'no') el.setAttribute('translate', 'no');
        });
      };
      protectIcons();
      const observer = new MutationObserver(protectIcons);
      observer.observe(document.documentElement, { childList: true, subtree: true });
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
